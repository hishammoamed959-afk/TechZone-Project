<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechZone | Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-light sticky-top bg-white">
        <div class="container">
            <a class="navbar-brand" href="index.php"><i class="fa-solid fa-microchip"></i> TechZone</a>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow border-0 p-5">
                    <h2 class="fw-bold mb-4 text-center">Complete Your Order</h2>
                    <form id="checkout-form">
                        <h5 class="mb-3">Shipping Details</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Full Address</label>
                                <input type="text" class="form-control" placeholder="123 Main St, Apartment, Studio, or floor" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">City</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" required>
                            </div>
                        </div>

                        <hr class="my-4">

                        <h5 class="mb-3">Payment Method</h5>
                        <div class="alert alert-info">
                            <i class="fa-solid fa-circle-info me-2"></i> This is a simulation. No real payment information is required.
                        </div>
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="radio" name="payment" id="cod" checked>
                            <label class="form-check-label fw-bold" for="cod">
                                Cash on Delivery (COD)
                            </label>
                        </div>

                        <button class="btn btn-primary w-100 py-3 fs-5 fw-bold mt-2" type="submit">Place Order</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container"><p class="mb-0">&copy; 2026 TechZone. All Rights Reserved.</p></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Handle checkout simulation
        document.getElementById('checkout-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('🎉 Order Placed Successfully! Thank you for shopping with TechZone.');
            localStorage.setItem('cart', JSON.stringify([])); // Empty the cart
            window.location.href = 'index.php'; // Redirect to home
        });
    </script>
</body>
</html>
