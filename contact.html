<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechZone | Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fa-solid fa-microchip"></i> TechZone</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <a href="cart.html" class="btn btn-outline-dark position-relative">
                        <i class="fa-solid fa-cart-shopping"></i> Cart
                        <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center mb-5">
                <h2 class="fw-bold">Get In Touch</h2>
                <p class="text-muted">Have questions? We'd love to hear from you. Send us a message below.</p>
            </div>
        </div>
        <div class="row g-5">
            <div class="col-lg-4">
                <div class="d-flex mb-4">
                    <div class="bg-primary text-white p-3 rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                        <i class="fa-solid fa-location-dot"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-1">Our Location</h5>
                        <p class="text-muted mb-0">Tech Park, Building 4, City Center</p>
                    </div>
                </div>
                <div class="d-flex mb-4">
                    <div class="bg-primary text-white p-3 rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-1">Email Us</h5>
                        <p class="text-muted mb-0">support@techzone.com</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <form class="card border-0 shadow-sm p-4" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <input type="text" class="form-control bg-light border-0 py-3" placeholder="Your Name" required>
                        </div>
                        <div class="col-md-6">
                            <input type="email" class="form-control bg-light border-0 py-3" placeholder="Your Email" required>
                        </div>
                        <div class="col-12">
                            <textarea class="form-control bg-light border-0 py-3" rows="5" placeholder="Your Message" required></textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary py-3 px-5 fw-bold">Send Message</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container"><p class="mb-0">&copy; 2026 TechZone. All Rights Reserved.</p></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
